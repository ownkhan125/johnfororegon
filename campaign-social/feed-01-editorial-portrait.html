<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 01 — Editorial Portrait</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a1628; --bark:#11203a; --umber:#8b0e22; --ember:#c8102e;
    --cream:#f5f5f5; --cream-soft:#fff; --cream-muted:#8a95a8;
    --serif:'Fraunces','Times New Roman',serif;
    --sans:'Inter',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;display:grid;place-items:center;min-height:100vh}
  .stage{
    width:1080px;height:1080px;position:relative;overflow:hidden;
    background:var(--ink);
    font-family:var(--sans);color:var(--cream);
    isolation:isolate;
  }
  /* Ambient radial washes */
  .washes{position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(58% 38% at 84% 8%, rgba(200,16,46,.45), transparent 60%),
      radial-gradient(48% 38% at 6% 18%, rgba(10,37,64,.6), transparent 60%),
      radial-gradient(62% 42% at 55% 110%, rgba(139,14,34,.55), transparent 60%);
  }
  .grain{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.18;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>");}
  .grid-bg{position:absolute;inset:0;z-index:0;opacity:.4;
    background-image:
      linear-gradient(to right, rgba(200,16,46,.07) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(30,58,138,.06) 1px, transparent 1px);
    background-size:60px 60px;
    -webkit-mask-image:radial-gradient(circle at 70% 40%, #000 35%, transparent 75%);
            mask-image:radial-gradient(circle at 70% 40%, #000 35%, transparent 75%);
  }
  /* Blueprint frame */
  .frame{position:absolute;inset:48px;z-index:5;pointer-events:none}
  .frame::before,.frame::after{content:'';position:absolute;width:34px;height:34px;border:1px solid rgba(200,16,46,.6)}
  .frame::before{top:0;left:0;border-right:0;border-bottom:0}
  .frame::after{bottom:0;right:0;border-left:0;border-top:0}
  .frame .tr,.frame .bl{position:absolute;width:34px;height:34px;border:1px solid rgba(200,16,46,.6)}
  .frame .tr{top:0;right:0;border-left:0;border-bottom:0}
  .frame .bl{bottom:0;left:0;border-right:0;border-top:0}
  /* Orbs */
  .orb{position:absolute;border-radius:999px;filter:blur(80px);z-index:0;mix-blend-mode:screen}
  .orb.a{left:-6%;top:36%;width:340px;height:340px;background:#c8102e;opacity:.35}
  .orb.b{right:18%;top:8%;width:280px;height:280px;background:#0a2540;opacity:.5}
  /* Layout */
  .layout{position:relative;z-index:10;display:grid;grid-template-columns:1.05fr 1.1fr;gap:46px;
    padding:120px 96px;height:100%;align-items:center}
  /* LEFT — editorial text */
  .eyebrow{display:flex;align-items:center;gap:14px;font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:#b8c0cc}
  .eyebrow .rule{display:block;width:42px;height:1px;background:rgba(245,245,245,.45)}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--ember);box-shadow:0 0 16px rgba(200,16,46,.8)}
  h1{font-family:var(--serif);font-weight:300;font-size:118px;line-height:.92;letter-spacing:-.025em;margin-top:34px;color:#fafafa;position:relative}
  h1 .italic{font-style:italic;font-weight:400;color:#fff}
  h1::before{content:'';position:absolute;left:-22px;top:14px;width:3px;height:74%;background:linear-gradient(180deg,var(--ember),var(--umber))}
  .rule-sm{height:1px;width:120px;background:rgba(245,245,245,.4);margin:30px 0 26px}
  .body{font-family:var(--serif);font-weight:300;font-size:21px;line-height:1.55;letter-spacing:.005em;color:rgba(245,245,245,.78);max-width:440px;font-style:italic}
  .meta{display:flex;gap:28px;margin-top:46px}
  .meta div{display:flex;flex-direction:column}
  .meta .num{font-family:var(--serif);font-weight:300;font-size:46px;line-height:1;color:#fff;letter-spacing:-.02em}
  .meta .lbl{margin-top:8px;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--cream-muted)}
  /* RIGHT — portrait stage */
  .stage-r{position:relative;width:100%;height:760px;perspective:1400px}
  .portrait-wrap{position:absolute;inset:0;transform:rotateY(-6deg) rotateX(2deg);transform-style:preserve-3d}
  .portrait{
    position:absolute;left:6%;top:0;width:78%;height:100%;
    border-radius:18px;overflow:hidden;
    background:
      linear-gradient(180deg, rgba(10,22,40,.0) 35%, rgba(10,22,40,.55) 100%),
      url('https://picsum.photos/seed/hartwell-portrait-feed/900/1200') center/cover;
    box-shadow:
      0 60px 120px -40px rgba(0,0,0,.7),
      0 30px 60px -30px rgba(200,16,46,.45),
      inset 0 1px 0 rgba(255,255,255,.08);
    transform:translateZ(40px);
  }
  .portrait::after{content:'';position:absolute;inset:0;background:linear-gradient(160deg, rgba(255,255,255,.07), transparent 40%)}
  .portrait-frame{position:absolute;left:0;top:24px;width:64%;height:calc(100% - 48px);
    border:1px solid rgba(200,16,46,.55);border-radius:18px;transform:translateZ(0)}
  .portrait-frame2{position:absolute;left:14%;top:48px;width:80%;height:calc(100% - 96px);
    border:1px solid rgba(245,245,245,.18);border-radius:18px;transform:translateZ(20px)}
  .stripes{position:absolute;right:-8px;top:48px;width:6px;height:240px;
    background:repeating-linear-gradient(to bottom, var(--ember) 0 6px, transparent 6px 14px);transform:translateZ(60px)}
  .badge{position:absolute;left:-12px;bottom:72px;background:rgba(10,22,40,.7);backdrop-filter:blur(18px);
    border:1px solid rgba(245,245,245,.18);padding:14px 20px;border-radius:12px;transform:translateZ(80px);
    box-shadow:0 30px 80px -30px rgba(0,0,0,.7)}
  .badge .b1{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:var(--cream-muted)}
  .badge .b2{font-family:var(--serif);font-style:italic;font-size:22px;color:#fff;margin-top:6px}
  /* Bottom band */
  .bottom{position:absolute;left:0;right:0;bottom:0;height:6px;background:linear-gradient(90deg,var(--ember),var(--umber));z-index:6}
  .corner-mark{position:absolute;top:52px;right:96px;z-index:11;font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:rgba(245,245,245,.5);font-family:var(--sans)}
</style>
</head>
<body>
  <div class="stage">
    <div class="washes"></div>
    <div class="grid-bg"></div>
    <div class="orb a"></div>
    <div class="orb b"></div>
    <div class="grain"></div>
    <div class="frame"><span class="tr"></span><span class="bl"></span></div>
    <div class="corner-mark">Vol. 01 · MMXXVI</div>

    <div class="layout">
      <div>
        <div class="eyebrow"><span class="rule"></span><span class="dot"></span>Lorem · Ipsum · MMXXVI</div>
        <h1>Lorem<br/><span class="italic">ipsum.</span><br/>Dolor<br/><span class="italic">sit amet.</span></h1>
        <div class="rule-sm"></div>
        <p class="body">Consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam.</p>
        <div class="meta">
          <div><span class="num">36</span><span class="lbl">Lorem</span></div>
          <div><span class="num">1.4K</span><span class="lbl">Ipsum</span></div>
          <div><span class="num">26+</span><span class="lbl">Dolor</span></div>
        </div>
      </div>

      <div class="stage-r">
        <div class="portrait-wrap">
          <div class="portrait-frame"></div>
          <div class="portrait-frame2"></div>
          <div class="portrait"></div>
          <div class="stripes"></div>
          <div class="badge">
            <div class="b1">Lorem Ipsum</div>
            <div class="b2">Dolor sit amet.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom"></div>
  </div>
</body>
</html>
