<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Story 12 — Centered Serif Poster</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;1,9..144,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0a1628;--ember:#c8102e;--umber:#8b0e22;--paper:#f3ead4;
    --serif:'Fraunces',serif;--sans:'Inter',system-ui,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;display:grid;place-items:center;min-height:100vh}
  .stage{width:1080px;height:1920px;position:relative;overflow:hidden;font-family:var(--sans);color:#1a1208;
    background:
      radial-gradient(60% 40% at 50% 8%, #fdf6dd, transparent 70%),
      linear-gradient(180deg, #ece4cf 0%, #d9ceb1 100%);isolation:isolate}
  .light{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(135deg, rgba(255,255,255,.5) 0%, transparent 25%, transparent 75%, rgba(40,20,5,.12) 100%)}
  .paper-tex{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.2;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.6'/></svg>");}
  .vignette{position:absolute;inset:0;z-index:8;pointer-events:none;
    background:radial-gradient(70% 60% at 50% 50%, transparent 50%, rgba(40,20,5,.35) 100%)}
  .ruler{position:absolute;inset:80px;border:1px solid rgba(40,20,10,.28);z-index:3}
  .ruler::before{content:'';position:absolute;inset:14px;border:1px dashed rgba(40,20,10,.18)}
  /* Top stripes block */
  .top-bar{position:absolute;left:100px;right:100px;top:120px;height:50px;z-index:5;
    display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--umber);padding-bottom:14px}
  .brand{font-family:var(--serif);font-weight:300;font-style:italic;font-size:30px;letter-spacing:-.015em;color:#1a1208}
  .brand b{font-style:normal;font-weight:400;color:var(--umber)}
  .label{font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:#5d4a30}
  /* Centerpiece */
  .center{position:absolute;left:0;right:0;top:330px;z-index:6;text-align:center;padding:0 80px}
  .pre{font-size:13px;letter-spacing:.46em;text-transform:uppercase;color:var(--umber)}
  h1{margin-top:38px;font-family:var(--serif);font-weight:200;font-size:280px;line-height:.84;letter-spacing:-.045em;color:#1a1208;
    text-shadow:0 4px 0 rgba(255,255,255,.4), 0 28px 60px rgba(40,20,5,.18)}
  h1 .it{font-style:italic;font-weight:300}
  h1 .red{color:var(--umber)}
  /* Rosette */
  .rosette{position:relative;margin:80px auto 0;width:240px;height:240px;perspective:1000px}
  .rosette .core{position:absolute;inset:30px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #f25762, var(--umber) 75%);
    box-shadow:
      inset 0 -10px 0 rgba(0,0,0,.3),
      inset 0 8px 0 rgba(255,255,255,.35),
      0 40px 80px -25px rgba(139,14,34,.6),
      0 0 0 8px rgba(255,255,255,.6),
      0 0 0 9px rgba(40,20,10,.18);}
  .rosette .core::after{content:'';position:absolute;inset:14px;border-radius:50%;border:1px dashed rgba(255,255,255,.4)}
  .rosette .text{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);color:#fff;font-family:var(--serif);font-style:italic;font-size:34px;text-align:center;text-shadow:0 2px 0 rgba(0,0,0,.25);z-index:2}
  .rosette .text small{display:block;font-size:11px;letter-spacing:.36em;text-transform:uppercase;font-style:normal;margin-top:4px;opacity:.85}
  .ribbon{position:absolute;left:50%;top:75%;width:120px;height:80px;transform:translateX(-50%);z-index:1}
  .ribbon::before,.ribbon::after{content:'';position:absolute;top:0;width:50px;height:90px;background:linear-gradient(180deg, var(--ember) 0%, var(--umber) 100%);
    box-shadow:0 18px 30px -10px rgba(139,14,34,.6), inset 0 -3px 0 rgba(0,0,0,.25)}
  .ribbon::before{left:0;clip-path:polygon(0 0, 100% 0, 100% 100%, 50% 70%, 0 100%);transform:rotate(-6deg) skewX(-2deg)}
  .ribbon::after{right:0;clip-path:polygon(0 0, 100% 0, 100% 100%, 50% 70%, 0 100%);transform:rotate(6deg) skewX(2deg)}
  /* Sub */
  .sub{margin-top:50px;font-family:var(--serif);font-style:italic;font-weight:300;font-size:26px;line-height:1.45;color:#3d2f1c;max-width:680px;margin-inline:auto}
  /* Bottom block */
  .bottom{position:absolute;left:100px;right:100px;bottom:140px;z-index:6;display:flex;justify-content:space-between;align-items:center;border-top:2px solid var(--umber);padding-top:18px}
  .bottom .l{font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:#5d4a30}
  .bottom .l span{color:var(--umber)}
  .pg{font-family:var(--serif);font-style:italic;font-size:26px;color:#1a1208}
  /* Decorative side ornaments */
  .orn{position:absolute;left:100px;right:100px;top:1380px;display:flex;justify-content:center;gap:18px;z-index:6}
  .orn .d{width:6px;height:6px;background:var(--umber);border-radius:50%}
  .orn .line{flex:1;max-width:120px;height:1px;background:var(--umber);align-self:center}
</style>
</head>
<body>
  <div class="stage">
    <div class="paper-tex"></div>
    <div class="light"></div>
    <div class="ruler"></div>

    <div class="top-bar">
      <div class="brand"><b>LOREM</b> <i>ipsum</i></div>
      <div class="label">No. XII · MMXXVI</div>
    </div>

    <div class="center">
      <div class="pre">— Lorem · Ipsum · Dolor —</div>
      <h1>Lorem<br/><span class="it">ipsum</span><br/><span class="red">dolor.</span></h1>

      <div class="rosette">
        <div class="ribbon"></div>
        <div class="core"></div>
        <div class="text"><span>1776</span><small>Lorem · Ipsum</small></div>
      </div>

      <p class="sub">Consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
    </div>

    <div class="orn">
      <span class="line"></span>
      <span class="d"></span><span class="d"></span><span class="d"></span>
      <span class="line"></span>
    </div>

    <div class="bottom">
      <div class="l"><span>Lorem</span> · ipsum dolor sit amet</div>
      <div class="pg">— pg. XII</div>
    </div>
    <div class="vignette"></div>
  </div>
</body>
</html>
