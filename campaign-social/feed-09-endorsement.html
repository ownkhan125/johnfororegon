<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 09 — Endorsement Card</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0a1628;--bark:#11203a;--ember:#c8102e;--umber:#8b0e22;--cream:#f5f5f5;
    --serif:'Fraunces',serif;--sans:'Inter',system-ui,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;display:grid;place-items:center;min-height:100vh}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;color:var(--cream);font-family:var(--sans);
    background:linear-gradient(160deg, #11203a 0%, #0a1628 50%, #050a14 100%);isolation:isolate}
  .washes{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:
      radial-gradient(45% 30% at 12% 22%, rgba(200,16,46,.28), transparent 60%),
      radial-gradient(55% 45% at 80% 80%, rgba(10,37,64,.6), transparent 60%);}
  .grid-bg{position:absolute;inset:0;z-index:1;opacity:.4;
    background-image:
      linear-gradient(to right, rgba(200,16,46,.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(30,58,138,.04) 1px, transparent 1px);
    background-size:54px 54px;
    -webkit-mask-image:radial-gradient(circle at 30% 50%, #000 30%, transparent 80%);}
  .grain{position:absolute;inset:0;z-index:9;opacity:.16;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/></svg>");}
  /* Giant dimensional quotation mark */
  .quote-art{position:absolute;left:60px;top:90px;z-index:3;font-family:var(--serif);font-style:italic;font-weight:300;
    font-size:580px;line-height:.78;letter-spacing:-.05em;
    background:linear-gradient(160deg, var(--ember) 0%, var(--umber) 40%, #4a0612 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:
      0 30px 80px rgba(200,16,46,.35);
    filter:drop-shadow(0 28px 40px rgba(0,0,0,.45));
    user-select:none;
  }
  .quote-art::after{content:'';position:absolute;left:0;top:0;right:0;height:50%;
    background:linear-gradient(180deg, rgba(255,255,255,.18), transparent);mix-blend-mode:overlay}
  /* Top labels */
  .top{position:absolute;top:80px;left:88px;right:88px;z-index:6;display:flex;justify-content:space-between;align-items:center;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:#a3b1c2}
  .top .l{display:flex;align-items:center;gap:14px}
  .top .l::before{content:'';width:8px;height:8px;background:var(--ember);border-radius:50%}
  /* Quote body */
  .body{position:absolute;left:88px;right:88px;top:300px;z-index:6}
  blockquote{font-family:var(--serif);font-weight:300;font-style:italic;font-size:64px;line-height:1.06;letter-spacing:-.018em;color:#fff;max-width:880px;
    text-shadow:0 4px 24px rgba(0,0,0,.5)}
  blockquote em{font-style:normal;color:var(--ember)}
  /* Attribution card */
  .attr-card{position:absolute;left:88px;right:88px;bottom:90px;z-index:6;
    display:flex;align-items:center;gap:28px;padding:26px 30px;border-radius:20px;
    background:linear-gradient(180deg, rgba(245,245,245,.06), rgba(245,245,245,.02));
    backdrop-filter:blur(18px);
    border:1px solid rgba(245,245,245,.1);
    box-shadow:0 40px 80px -30px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .avatar{width:110px;height:110px;border-radius:50%;flex-shrink:0;
    background:url('https://picsum.photos/seed/endorse-avatar/300/300') center/cover;
    box-shadow:0 0 0 4px var(--ink), 0 0 0 5px rgba(200,16,46,.7), 0 20px 40px -15px rgba(200,16,46,.55), inset 0 0 0 1px rgba(255,255,255,.05);
    filter:contrast(1.05) saturate(.9);
  }
  .attr-text{flex:1}
  .attr-text .n{font-family:var(--serif);font-weight:300;font-size:32px;color:#fff;letter-spacing:-.01em}
  .attr-text .n em{font-style:italic;color:var(--ember)}
  .attr-text .r{margin-top:6px;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#a3b1c2}
  .attr-text .r span{color:#fff}
  .badge{padding:14px 22px;border-radius:999px;background:linear-gradient(180deg, var(--ember), var(--umber));color:#fff;font-size:10px;letter-spacing:.34em;text-transform:uppercase;font-weight:500;
    box-shadow:0 20px 40px -15px rgba(200,16,46,.55), inset 0 1px 0 rgba(255,255,255,.25), inset 0 -2px 0 rgba(0,0,0,.25)}
  /* Frame */
  .br{position:absolute;width:22px;height:22px;border:1px solid var(--ember);z-index:8}
  .br.tl{top:42px;left:42px;border-right:0;border-bottom:0}
  .br.tr{top:42px;right:42px;border-left:0;border-bottom:0}
  .br.bl{bottom:42px;left:42px;border-right:0;border-top:0}
  .br.br2{bottom:42px;right:42px;border-left:0;border-top:0}
  .baseline{position:absolute;left:0;right:0;bottom:0;height:5px;background:linear-gradient(90deg, var(--umber), var(--ember), var(--umber));z-index:9}
</style>
</head>
<body>
  <div class="stage">
    <div class="washes"></div>
    <div class="grid-bg"></div>

    <div class="br tl"></div><div class="br tr"></div><div class="br bl"></div><div class="br br2"></div>

    <div class="top">
      <div class="l">Lorem &middot; Ipsum &middot; MMXXVI</div>
      <div>No. 09 / Vol. III</div>
    </div>

    <div class="quote-art">&ldquo;</div>

    <div class="body">
      <blockquote>Lorem ipsum dolor sit amet, <em>consectetur adipiscing elit</em> — sed do eiusmod tempor incididunt ut labore et dolore magna aliqua, veniam quis nostrud.</blockquote>
    </div>

    <div class="attr-card">
      <div class="avatar"></div>
      <div class="attr-text">
        <div class="n">Lorem Ipsum, <em>Dolor.</em></div>
        <div class="r">Sit amet · Consectetur · <span>Adipiscing</span></div>
      </div>
      <div class="badge">Lorem · Ipsum</div>
    </div>

    <div class="grain"></div>
    <div class="baseline"></div>
  </div>
</body>
</html>
