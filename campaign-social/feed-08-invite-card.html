<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 08 — Floating Invite Card</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0a1628;--ember:#c8102e;--umber:#8b0e22;--cream:#f5f5f5;--paper:#f5eedb;
    --serif:'Fraunces',serif;--sans:'Inter',system-ui,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;display:grid;place-items:center;min-height:100vh}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;font-family:var(--sans);color:#fff;
    background:
      radial-gradient(50% 35% at 30% 10%, rgba(200,16,46,.32), transparent 60%),
      radial-gradient(60% 50% at 80% 100%, rgba(10,37,64,.7), transparent 60%),
      linear-gradient(180deg, #0a1628, #050912);
    isolation:isolate;perspective:1800px;}
  .grid-bg{position:absolute;inset:0;z-index:1;opacity:.5;
    background-image:
      linear-gradient(to right, rgba(200,16,46,.07) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(30,58,138,.05) 1px, transparent 1px);
    background-size:60px 60px;
    -webkit-mask-image:radial-gradient(circle at 50% 50%, #000 30%, transparent 80%);}
  .orb{position:absolute;border-radius:50%;filter:blur(80px);z-index:0}
  .orb.a{left:-10%;top:0;width:380px;height:380px;background:#8b0e22;opacity:.5}
  .orb.b{right:-10%;bottom:0;width:480px;height:480px;background:#0a2540;opacity:.7}
  .grain{position:absolute;inset:0;z-index:9;opacity:.16;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/></svg>");}
  /* Surface line */
  .surface{position:absolute;left:0;right:0;bottom:0;height:50%;z-index:1;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.4))}
  /* Center stage */
  .center{position:absolute;inset:0;display:grid;place-items:center;z-index:5;perspective:1600px}
  .invite-wrap{position:relative;width:660px;height:780px;transform-style:preserve-3d;transform:rotateX(8deg) rotateY(-4deg)}
  /* Shadow on ground */
  .ground{position:absolute;left:-40px;right:-40px;bottom:-60px;height:120px;
    background:radial-gradient(closest-side, rgba(0,0,0,.65), transparent 70%);filter:blur(30px);transform:translateZ(-100px) rotateX(80deg);transform-origin:center}
  /* Invite card paper */
  .invite{position:absolute;inset:0;border-radius:12px;overflow:hidden;
    background:
      radial-gradient(120% 80% at 20% 0%, #fff8e6, var(--paper) 60%);
    color:#1a1208;
    box-shadow:
      0 80px 160px -40px rgba(0,0,0,.7),
      0 40px 80px -30px rgba(200,16,46,.4),
      inset 0 1px 0 rgba(255,255,255,.5);
    transform-style:preserve-3d;
  }
  .invite::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.5'/></svg>");opacity:.18;mix-blend-mode:multiply;pointer-events:none}
  .invite::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg, rgba(255,255,255,.4) 0%, transparent 30%, transparent 70%, rgba(40,20,5,.15) 100%);pointer-events:none}
  /* Flag wrap band */
  .band{position:absolute;left:-30px;right:-30px;top:88px;height:60px;
    background:linear-gradient(180deg, var(--ember), var(--umber));
    box-shadow:0 20px 40px -10px rgba(200,16,46,.6), inset 0 -2px 0 rgba(0,0,0,.25), inset 0 2px 0 rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;color:#fff;
    font-size:13px;letter-spacing:.42em;text-transform:uppercase;font-weight:500;
    transform:translateZ(20px);
  }
  .band::before,.band::after{content:'';position:absolute;top:100%;border-style:solid;border-width:12px 12px 0 0}
  .band::before{left:0;border-color:#5a0814 transparent transparent transparent;border-width:12px 12px 0 0}
  .band::after{right:0;border-color:#5a0814 transparent transparent transparent;border-width:12px 0 0 12px}
  /* Inner border */
  .inner-border{position:absolute;inset:48px 40px;border:1px solid rgba(40,20,10,.25);z-index:2}
  .inner-border::before{content:'';position:absolute;inset:6px;border:1px dashed rgba(40,20,10,.18)}
  /* Content */
  .content{position:absolute;left:0;right:0;top:200px;text-align:center;z-index:3;padding:0 80px}
  .pre{font-size:10px;letter-spacing:.42em;text-transform:uppercase;color:#5d4a30}
  h1{margin-top:36px;font-family:var(--serif);font-weight:200;font-style:italic;font-size:96px;line-height:.92;letter-spacing:-.025em;color:#1a1208}
  h1 .red{font-style:normal;font-weight:300;color:var(--umber)}
  .rule{margin:32px auto;width:80px;height:1px;background:linear-gradient(90deg, transparent, var(--umber), transparent)}
  .details{display:flex;justify-content:center;gap:46px;align-items:flex-start;margin-top:28px}
  .det{display:flex;flex-direction:column;align-items:center}
  .det .n{font-family:var(--serif);font-style:italic;font-size:36px;color:#1a1208;line-height:1}
  .det .l{margin-top:8px;font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:#5d4a30}
  .vrule{width:1px;background:rgba(40,20,10,.25)}
  .lead{margin-top:32px;font-family:var(--serif);font-style:italic;font-weight:300;font-size:18px;line-height:1.6;color:#3d2f1c}
  /* Stamp */
  .stamp{position:absolute;right:50px;bottom:60px;width:120px;height:120px;border-radius:50%;border:2px solid var(--umber);color:var(--umber);
    display:grid;place-items:center;font-family:var(--serif);font-style:italic;font-size:18px;text-align:center;
    transform:rotate(-12deg);opacity:.7}
  .stamp::after{content:'';position:absolute;inset:6px;border-radius:50%;border:1px dashed var(--umber)}
  .stamp span{position:relative;line-height:1.1}
  /* Bottom number */
  .pg{position:absolute;left:50px;bottom:60px;font-family:var(--serif);font-style:italic;font-size:14px;color:#5d4a30}
  /* Frame */
  .frame{position:absolute;inset:40px;border:1px solid rgba(245,245,245,.1);z-index:8;pointer-events:none}
  .corn{position:absolute;width:22px;height:22px;border:1px solid var(--ember);z-index:8}
  .corn.tl{top:30px;left:30px;border-right:0;border-bottom:0}
  .corn.tr{top:30px;right:30px;border-left:0;border-bottom:0}
  .corn.bl{bottom:30px;left:30px;border-right:0;border-top:0}
  .corn.br{bottom:30px;right:30px;border-left:0;border-top:0}
</style>
</head>
<body>
  <div class="stage">
    <div class="grid-bg"></div>
    <div class="orb a"></div>
    <div class="orb b"></div>
    <div class="surface"></div>
    <div class="frame"></div>
    <div class="corn tl"></div><div class="corn tr"></div><div class="corn bl"></div><div class="corn br"></div>

    <div class="center">
      <div class="invite-wrap">
        <div class="ground"></div>
        <div class="invite">
          <div class="inner-border"></div>
          <div class="band">Lorem &middot; Ipsum &middot; Dolor</div>
          <div class="content">
            <div class="pre">— Lorem ipsum dolor sit amet —</div>
            <h1>Lorem,<br/><span class="red">ipsum.</span></h1>
            <div class="rule"></div>
            <div class="details">
              <div class="det"><span class="n">VI.XXIV</span><span class="l">Lorem</span></div>
              <div class="vrule"></div>
              <div class="det"><span class="n">18:30</span><span class="l">Ipsum</span></div>
              <div class="vrule"></div>
              <div class="det"><span class="n">PDX</span><span class="l">Dolor</span></div>
            </div>
            <p class="lead">Consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore.</p>
          </div>
          <div class="stamp"><span>Lorem<br/>Ipsum</span></div>
          <div class="pg">— Vol. 08</div>
        </div>
      </div>
    </div>
    <div class="grain"></div>
  </div>
</body>
</html>
