<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Story 17 — Vertical Map Storytelling</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0a1628;--ember:#c8102e;--umber:#8b0e22;--cream:#f5f5f5;
    --serif:'Fraunces',serif;--sans:'Inter',system-ui,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;display:grid;place-items:center;min-height:100vh}
  .stage{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--cream);font-family:var(--sans);
    background:linear-gradient(180deg, #0a1628 0%, #11203a 50%, #0a1628 100%);isolation:isolate}
  .washes{position:absolute;inset:0;z-index:1;
    background:
      radial-gradient(50% 30% at 50% 10%, rgba(200,16,46,.4), transparent 60%),
      radial-gradient(50% 35% at 10% 70%, rgba(139,14,34,.3), transparent 60%);}
  .grid-bg{position:absolute;inset:0;z-index:1;opacity:.45;
    background-image:
      linear-gradient(to right, rgba(200,16,46,.06) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(245,245,245,.04) 1px, transparent 1px);
    background-size:54px 54px;
    -webkit-mask-image:radial-gradient(circle at 50% 45%, #000 30%, transparent 80%);}
  .grain{position:absolute;inset:0;z-index:9;opacity:.16;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/></svg>");}
  /* Top */
  .top{position:absolute;top:120px;left:90px;right:90px;text-align:center;z-index:6}
  .eyebrow{font-size:13px;letter-spacing:.44em;text-transform:uppercase;color:#a3b1c2;display:inline-flex;align-items:center;gap:14px}
  .eyebrow .dot{width:8px;height:8px;background:var(--ember);border-radius:50%;box-shadow:0 0 16px rgba(200,16,46,.9)}
  h1{margin-top:34px;font-family:var(--serif);font-weight:300;font-size:152px;line-height:.92;color:#fff;letter-spacing:-.028em}
  h1 em{font-style:italic;color:var(--ember);font-weight:400}
  h1 .sub{display:block;margin-top:24px;font-family:var(--serif);font-style:italic;font-weight:300;font-size:26px;line-height:1.4;color:rgba(245,245,245,.78);letter-spacing:0;max-width:720px;margin-inline:auto}
  /* Map stage */
  .map-stage{position:absolute;left:60px;right:60px;top:600px;height:880px;z-index:4;perspective:1800px}
  .map-3d{position:relative;width:100%;height:100%;transform-style:preserve-3d;transform:rotateX(28deg) rotateZ(-3deg)}
  .map-shadow{position:absolute;left:60px;right:60px;bottom:-30px;height:60px;background:radial-gradient(closest-side, rgba(0,0,0,.7), transparent 70%);filter:blur(30px);transform:translateZ(-50px)}
  .map-svg{position:absolute;inset:0}
  .map-svg svg{width:100%;height:100%;filter:drop-shadow(0 30px 60px rgba(200,16,46,.4))}
  .pin{position:absolute;transform-style:preserve-3d}
  .pin .stick{position:absolute;left:50%;bottom:0;width:2px;height:60px;background:linear-gradient(180deg, var(--ember), rgba(200,16,46,.2));transform:translateX(-50%)}
  .pin .head{position:absolute;left:50%;bottom:54px;width:22px;height:22px;border-radius:50%;background:var(--ember);transform:translateX(-50%);
    box-shadow:0 0 28px rgba(200,16,46,.95), inset 0 -4px 0 rgba(0,0,0,.3), inset 0 3px 0 rgba(255,255,255,.4)}
  .pin .head::after{content:'';position:absolute;inset:-9px;border-radius:50%;border:1px solid rgba(200,16,46,.55)}
  .pin .lbl{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);background:rgba(10,22,40,.85);backdrop-filter:blur(10px);
    border:1px solid rgba(200,16,46,.4);padding:6px 12px;border-radius:6px;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#fff;white-space:nowrap;
    box-shadow:0 10px 20px -8px rgba(200,16,46,.45)}
  /* Bottom stats glass */
  .stats{position:absolute;left:80px;right:80px;bottom:200px;z-index:6;padding:30px 36px;border-radius:22px;
    background:linear-gradient(180deg, rgba(245,245,245,.07), rgba(245,245,245,.02));
    backdrop-filter:blur(20px);
    border:1px solid rgba(245,245,245,.12);
    box-shadow:0 60px 100px -40px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.1);
    display:flex;justify-content:space-between;align-items:center;gap:30px}
  .stats .col{flex:1;text-align:center}
  .stats .col + .col{border-left:1px solid rgba(245,245,245,.15)}
  .stats .v{font-family:var(--serif);font-weight:300;font-size:54px;color:#fff;letter-spacing:-.02em;line-height:1}
  .stats .v em{color:var(--ember);font-style:italic}
  .stats .l{margin-top:8px;font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:#a3b1c2}
  /* corners + baseline */
  .br{position:absolute;width:24px;height:24px;border:1px solid var(--ember);z-index:8}
  .br.tl{top:54px;left:54px;border-right:0;border-bottom:0}
  .br.tr{top:54px;right:54px;border-left:0;border-bottom:0}
  .br.bl{bottom:54px;left:54px;border-right:0;border-top:0}
  .br.br2{bottom:54px;right:54px;border-left:0;border-top:0}
  .baseline{position:absolute;left:0;right:0;bottom:0;height:7px;background:linear-gradient(90deg, var(--umber), var(--ember), var(--umber));z-index:9}
  .footer-mark{position:absolute;bottom:80px;left:90px;right:90px;z-index:7;display:flex;justify-content:space-between;font-size:11px;letter-spacing:.36em;text-transform:uppercase;color:#a3b1c2}
  .footer-mark span{color:#fff}
</style>
</head>
<body>
  <div class="stage">
    <div class="washes"></div>
    <div class="grid-bg"></div>
    <div class="br tl"></div><div class="br tr"></div><div class="br bl"></div><div class="br br2"></div>

    <div class="top">
      <div class="eyebrow"><span class="dot"></span>Lorem · Ipsum · MMXXVI</div>
      <h1>Lorem <em>ipsum.</em><span class="sub">Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</span></h1>
    </div>

    <div class="map-stage">
      <div class="map-3d">
        <div class="map-shadow"></div>
        <div class="map-svg">
          <svg viewBox="0 0 960 800" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="m1" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#1d3060"/>
                <stop offset="100%" stop-color="#0a1628"/>
              </linearGradient>
              <linearGradient id="m2" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="rgba(200,16,46,.7)"/>
                <stop offset="100%" stop-color="rgba(245,245,245,.3)"/>
              </linearGradient>
            </defs>
            <path d="M50 220 L100 170 L200 140 L340 120 L500 110 L650 115 L800 130 L900 170 L905 320 L890 440 L860 560 L800 620 L660 650 L500 660 L340 658 L220 640 L120 600 L80 520 L60 400 Z"
              fill="url(#m1)" stroke="url(#m2)" stroke-width="1.6"/>
            <path d="M100 260 Q300 230 600 240 T880 270" fill="none" stroke="rgba(245,245,245,.12)" stroke-width="1"/>
            <path d="M100 360 Q300 340 600 350 T880 370" fill="none" stroke="rgba(200,16,46,.2)" stroke-width="1"/>
            <path d="M100 460 Q300 440 600 450 T880 470" fill="none" stroke="rgba(245,245,245,.1)" stroke-width="1"/>
            <path d="M100 560 Q300 540 600 550 T880 570" fill="none" stroke="rgba(200,16,46,.15)" stroke-width="1"/>
          </svg>
        </div>
        <div class="pin" style="left:18%;top:44%"><div class="lbl">Lorem</div><div class="stick"></div><div class="head"></div></div>
        <div class="pin" style="left:36%;top:60%"><div class="stick"></div><div class="head"></div></div>
        <div class="pin" style="left:50%;top:48%"><div class="lbl">Ipsum</div><div class="stick"></div><div class="head"></div></div>
        <div class="pin" style="left:64%;top:66%"><div class="stick"></div><div class="head"></div></div>
        <div class="pin" style="left:78%;top:54%"><div class="lbl">Dolor</div><div class="stick"></div><div class="head"></div></div>
        <div class="pin" style="left:28%;top:72%"><div class="stick"></div><div class="head"></div></div>
        <div class="pin" style="left:44%;top:40%"><div class="stick"></div><div class="head"></div></div>
      </div>
    </div>

    <div class="stats">
      <div class="col"><div class="v">36<em>/36</em></div><div class="l">Lorem</div></div>
      <div class="col"><div class="v">1.2K</div><div class="l">Ipsum</div></div>
      <div class="col"><div class="v">12<em>mo</em></div><div class="l">Dolor</div></div>
    </div>

    <div class="footer-mark"><div>Lorem · Ipsum dolor</div><div>Vol. 17 — <span>MMXXVI</span></div></div>
    <div class="grain"></div>
    <div class="baseline"></div>
  </div>
</body>
</html>
