<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Story 14 — Numeric Hero</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;1,9..144,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0a1628;--ember:#c8102e;--umber:#8b0e22;--cream:#f5f5f5;
    --serif:'Fraunces',serif;--sans:'Inter',system-ui,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;display:grid;place-items:center;min-height:100vh}
  .stage{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--cream);font-family:var(--sans);
    background:radial-gradient(70% 50% at 50% 40%, #1d335f, #0a1628 70%);isolation:isolate;perspective:1800px}
  .washes{position:absolute;inset:0;z-index:1;
    background:
      radial-gradient(50% 30% at 50% 30%, rgba(200,16,46,.5), transparent 60%),
      radial-gradient(60% 40% at 0% 80%, rgba(139,14,34,.35), transparent 60%),
      radial-gradient(60% 40% at 100% 100%, rgba(10,37,64,.6), transparent 60%);}
  .grid-bg{position:absolute;inset:0;z-index:1;opacity:.5;
    background-image:
      linear-gradient(to right, rgba(200,16,46,.07) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(245,245,245,.04) 1px, transparent 1px);
    background-size:60px 60px;
    -webkit-mask-image:radial-gradient(circle at 50% 45%, #000 30%, transparent 75%);}
  .grain{position:absolute;inset:0;z-index:9;opacity:.16;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/></svg>");}
  /* Top */
  .top{position:absolute;top:130px;left:0;right:0;text-align:center;z-index:6}
  .eyebrow{font-size:14px;letter-spacing:.44em;text-transform:uppercase;color:#a3b1c2;display:inline-flex;align-items:center;gap:14px}
  .eyebrow .dot{width:8px;height:8px;background:var(--ember);border-radius:50%;box-shadow:0 0 16px rgba(200,16,46,.9)}
  .pre{margin-top:30px;font-family:var(--serif);font-style:italic;font-weight:300;font-size:30px;color:#fff;letter-spacing:-.01em}
  /* Giant number */
  .hero{position:absolute;left:0;right:0;top:380px;z-index:5;text-align:center;transform-style:preserve-3d}
  .num{display:inline-block;font-family:var(--serif);font-weight:200;font-size:680px;line-height:.86;letter-spacing:-.06em;
    color:#fff;
    text-shadow:
      0 6px 0 rgba(0,0,0,.18),
      0 60px 100px rgba(200,16,46,.45);
    background:linear-gradient(180deg, #ffffff 30%, #f8d9de 50%, #ffffff 65%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 40px 60px rgba(0,0,0,.4));
    position:relative}
  .num small{display:inline;font-size:260px;color:var(--ember);background:none;-webkit-text-fill-color:var(--ember);vertical-align:top;line-height:1;margin-left:8px;text-shadow:0 30px 60px rgba(200,16,46,.7)}
  /* Reflection */
  .reflect{position:absolute;left:0;right:0;top:960px;height:120px;z-index:4;text-align:center;opacity:.09;overflow:hidden;
    -webkit-mask-image:linear-gradient(180deg, #000, transparent 80%);
            mask-image:linear-gradient(180deg, #000, transparent 80%);
    pointer-events:none;
    transform:scaleY(-1);font-family:var(--serif);font-weight:200;font-size:520px;line-height:.86;color:#fff;letter-spacing:-.06em}
  /* Sub label */
  .sub-label{position:absolute;left:0;right:0;top:1080px;text-align:center;z-index:6;padding:0 80px}
  .sub-label .rule{margin:0 auto 26px;width:90px;height:1px;background:linear-gradient(90deg, transparent, var(--ember), transparent)}
  .sub-label .h{font-family:var(--serif);font-weight:300;font-style:italic;font-size:84px;color:#fff;letter-spacing:-.022em;line-height:1}
  .sub-label .h em{font-style:italic;color:var(--ember)}
  .sub-label p{margin:28px auto 0;font-family:var(--serif);font-style:italic;font-size:24px;line-height:1.55;color:rgba(245,245,245,.78);max-width:720px}
  /* Glass card */
  .glass{position:absolute;left:80px;right:80px;bottom:200px;padding:30px 36px;border-radius:22px;z-index:6;
    background:linear-gradient(180deg, rgba(245,245,245,.07), rgba(245,245,245,.02));
    backdrop-filter:blur(20px);
    border:1px solid rgba(245,245,245,.12);
    box-shadow:0 60px 100px -40px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.1);
    display:flex;justify-content:space-between;align-items:center;gap:30px}
  .glass .col{flex:1;text-align:center}
  .glass .col + .col{border-left:1px solid rgba(245,245,245,.15)}
  .glass .v{font-family:var(--serif);font-weight:300;font-size:54px;color:#fff;letter-spacing:-.02em;line-height:1}
  .glass .v em{color:var(--ember);font-style:italic}
  .glass .l{margin-top:8px;font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:#a3b1c2}
  /* corners + baseline */
  .br{position:absolute;width:24px;height:24px;border:1px solid var(--ember);z-index:8}
  .br.tl{top:54px;left:54px;border-right:0;border-bottom:0}
  .br.tr{top:54px;right:54px;border-left:0;border-bottom:0}
  .br.bl{bottom:54px;left:54px;border-right:0;border-top:0}
  .br.br2{bottom:54px;right:54px;border-left:0;border-top:0}
  .baseline{position:absolute;left:0;right:0;bottom:0;height:7px;background:linear-gradient(90deg, var(--umber), var(--ember), var(--umber));z-index:9}
</style>
</head>
<body>
  <div class="stage">
    <div class="washes"></div>
    <div class="grid-bg"></div>
    <div class="br tl"></div><div class="br tr"></div><div class="br bl"></div><div class="br br2"></div>

    <div class="top">
      <div class="eyebrow"><span class="dot"></span>Lorem · Ipsum · MMXXVI</div>
      <div class="pre">Consectetur adipiscing.</div>
    </div>

    <div class="hero">
      <div class="num">26<small>K+</small></div>
    </div>
    <div class="reflect">26+</div>

    <div class="sub-label">
      <div class="rule"></div>
      <div class="h"><em>Lorem</em> ipsum dolor sit.</div>
      <p>Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
    </div>

    <div class="glass">
      <div class="col"><div class="v">36</div><div class="l">Lorem</div></div>
      <div class="col"><div class="v">$1.4<em>M</em></div><div class="l">Ipsum</div></div>
      <div class="col"><div class="v">1.2K</div><div class="l">Dolor</div></div>
    </div>

    <div class="grain"></div>
    <div class="baseline"></div>
  </div>
</body>
</html>
