<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 04 — County Map</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0a1628;--bark:#11203a;--ember:#c8102e;--umber:#8b0e22;--cream:#f5f5f5;--cream-muted:#8a95a8;
    --serif:'Fraunces',serif;--sans:'Inter',system-ui,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;display:grid;place-items:center;min-height:100vh}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;color:var(--cream);font-family:var(--sans);
    background:linear-gradient(160deg, #0a1628 0%, #11203a 60%, #0a1628 100%);isolation:isolate}
  .washes{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:
      radial-gradient(50% 35% at 70% 30%, rgba(200,16,46,.32), transparent 60%),
      radial-gradient(55% 45% at 20% 80%, rgba(10,37,64,.7), transparent 60%);}
  .grid-bg{position:absolute;inset:0;z-index:1;opacity:.6;
    background-image:
      linear-gradient(to right, rgba(200,16,46,.08) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(30,58,138,.06) 1px, transparent 1px);
    background-size:54px 54px;
    -webkit-mask-image:radial-gradient(circle at 55% 50%, #000 30%, transparent 75%);}
  .grain{position:absolute;inset:0;z-index:9;opacity:.16;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/></svg>");}
  /* Top text */
  .top{position:absolute;top:84px;left:96px;right:96px;z-index:5;display:flex;justify-content:space-between;align-items:flex-start}
  .eyebrow{font-size:12px;letter-spacing:.36em;text-transform:uppercase;color:#a3b1c2;display:flex;align-items:center;gap:14px}
  .eyebrow .dot{width:8px;height:8px;background:var(--ember);border-radius:50%;box-shadow:0 0 16px rgba(200,16,46,.8)}
  .top-r{font-family:var(--serif);font-style:italic;font-size:18px;color:#b8c0cc}
  /* Headline lower-left */
  .title{position:absolute;left:96px;top:160px;z-index:5;max-width:520px}
  .title h1{font-family:var(--serif);font-weight:300;font-size:78px;line-height:.96;color:#fff;letter-spacing:-.02em}
  .title h1 em{font-style:italic;font-weight:400;color:var(--ember)}
  .title p{margin-top:24px;font-family:var(--serif);font-style:italic;font-weight:300;font-size:18px;line-height:1.5;color:rgba(245,245,245,.72);max-width:380px}
  /* Map stage */
  .map-wrap{position:absolute;right:46px;top:200px;width:600px;height:520px;z-index:4;perspective:1400px}
  .map-3d{position:relative;width:100%;height:100%;transform-style:preserve-3d;transform:rotateX(28deg) rotateY(-14deg) rotateZ(2deg)}
  .map-shadow{position:absolute;inset:30px 60px -10px 60px;background:radial-gradient(closest-side, rgba(0,0,0,.55), transparent 70%);filter:blur(30px);transform:translateZ(-30px)}
  .map-svg{position:absolute;inset:0;transform:translateZ(0)}
  .map-svg svg{width:100%;height:100%;display:block;filter:drop-shadow(0 30px 60px rgba(200,16,46,.45))}
  /* Pin */
  .pin{position:absolute;transform-style:preserve-3d}
  .pin .stick{position:absolute;left:50%;bottom:0;width:2px;height:46px;background:linear-gradient(180deg, var(--ember), rgba(200,16,46,.2));transform:translateX(-50%)}
  .pin .head{position:absolute;left:50%;bottom:42px;width:18px;height:18px;border-radius:50%;background:var(--ember);transform:translateX(-50%);
    box-shadow:0 0 22px rgba(200,16,46,.9), inset 0 -3px 0 rgba(0,0,0,.3), inset 0 2px 0 rgba(255,255,255,.4)}
  .pin .head::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(200,16,46,.5)}
  /* Bottom stats */
  .stats{position:absolute;left:96px;right:96px;bottom:90px;z-index:5;display:flex;justify-content:space-between;align-items:flex-end}
  .s-item .v{font-family:var(--serif);font-weight:300;font-size:56px;color:#fff;letter-spacing:-.02em;line-height:1}
  .s-item .v em{color:var(--ember);font-style:italic}
  .s-item .l{margin-top:8px;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#a3b1c2}
  .vrule{width:1px;height:54px;background:rgba(245,245,245,.18)}
  /* Frame */
  .frame{position:absolute;inset:40px;border:1px solid rgba(245,245,245,.12);z-index:6;pointer-events:none}
  .frame .b1,.frame .b2,.frame .b3,.frame .b4{position:absolute;width:20px;height:20px;border:1px solid var(--ember)}
  .frame .b1{top:-1px;left:-1px;border-right:0;border-bottom:0}
  .frame .b2{top:-1px;right:-1px;border-left:0;border-bottom:0}
  .frame .b3{bottom:-1px;left:-1px;border-right:0;border-top:0}
  .frame .b4{bottom:-1px;right:-1px;border-left:0;border-top:0}
  /* Bottom band */
  .band{position:absolute;left:0;right:0;bottom:0;height:5px;background:linear-gradient(90deg, var(--umber), var(--ember), var(--umber));z-index:7}
</style>
</head>
<body>
  <div class="stage">
    <div class="washes"></div>
    <div class="grid-bg"></div>

    <div class="frame"><span class="b1"></span><span class="b2"></span><span class="b3"></span><span class="b4"></span></div>

    <div class="top">
      <div class="eyebrow"><span class="dot"></span>Lorem Ipsum · MMXXVI</div>
      <div class="top-r">No. 04 — Dolor sit amet.</div>
    </div>

    <div class="title">
      <h1>Lorem ipsum<br/><em>dolor sit amet</em>,<br/>consectetur.</h1>
      <p>Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Lorem ipsum dolor sit amet.</p>
    </div>

    <div class="map-wrap">
      <div class="map-3d">
        <div class="map-shadow"></div>
        <div class="map-svg">
          <svg viewBox="0 0 600 520" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#1b2f55"/>
                <stop offset="100%" stop-color="#0a1628"/>
              </linearGradient>
              <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="rgba(200,16,46,.7)"/>
                <stop offset="100%" stop-color="rgba(245,245,245,.3)"/>
              </linearGradient>
            </defs>
            <!-- Stylized OR-like blob -->
            <path d="M30 140 L60 110 L130 90 L220 80 L320 70 L420 75 L520 90 L560 120 L555 200 L545 280 L530 360 L500 400 L420 420 L320 425 L220 420 L140 410 L80 380 L50 320 L40 240 Z"
              fill="url(#g1)" stroke="url(#g2)" stroke-width="1.5"/>
            <!-- inner contour lines -->
            <path d="M70 160 Q200 140 360 150 T540 170" fill="none" stroke="rgba(245,245,245,.12)" stroke-width="1"/>
            <path d="M70 220 Q220 200 380 210 T540 230" fill="none" stroke="rgba(200,16,46,.18)" stroke-width="1"/>
            <path d="M70 290 Q220 280 380 290 T540 305" fill="none" stroke="rgba(245,245,245,.1)" stroke-width="1"/>
            <path d="M70 360 Q220 350 380 360 T540 370" fill="none" stroke="rgba(200,16,46,.12)" stroke-width="1"/>
          </svg>
        </div>
        <div class="pin" style="left:18%;top:32%"><div class="stick"></div><div class="head"></div></div>
        <div class="pin" style="left:30%;top:52%"><div class="stick"></div><div class="head"></div></div>
        <div class="pin" style="left:46%;top:38%"><div class="stick"></div><div class="head"></div></div>
        <div class="pin" style="left:58%;top:60%"><div class="stick"></div><div class="head"></div></div>
        <div class="pin" style="left:70%;top:42%"><div class="stick"></div><div class="head"></div></div>
        <div class="pin" style="left:82%;top:54%"><div class="stick"></div><div class="head"></div></div>
      </div>
    </div>

    <div class="stats">
      <div class="s-item"><div class="v">36<em>/36</em></div><div class="l">Lorem ipsum</div></div>
      <div class="vrule"></div>
      <div class="s-item"><div class="v">1.2K</div><div class="l">Dolor sit amet</div></div>
      <div class="vrule"></div>
      <div class="s-item"><div class="v">12<em>mo.</em></div><div class="l">Consectetur</div></div>
    </div>

    <div class="grain"></div>
    <div class="band"></div>
  </div>
</body>
</html>
