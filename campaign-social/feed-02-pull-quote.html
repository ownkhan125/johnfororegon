<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Feed 02 — Editorial Pull Quote</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a1628; --umber:#8b0e22; --ember:#c8102e;
    --cream:#f5f5f5; --paper:#eeeae0; --paper-warm:#e6dfd0;
    --serif:'Fraunces',serif; --sans:'Inter',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;display:grid;place-items:center;min-height:100vh}
  .stage{width:1080px;height:1080px;position:relative;overflow:hidden;font-family:var(--sans);isolation:isolate;
    background:
      radial-gradient(60% 50% at 50% 0%, #f5f0e3, transparent 70%),
      linear-gradient(180deg, #e8e1d1 0%, #d8cfbb 100%);
    color:#1a1a1a;
  }
  /* Subtle warm vignette */
  .vignette{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(80% 60% at 50% 60%, transparent 40%, rgba(50,30,15,.25) 100%)}
  .grain{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:.18;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>");}
  /* Hairline ruler border */
  .ruler{position:absolute;inset:60px;z-index:3;pointer-events:none;border:1px solid rgba(40,20,10,.22)}
  .ruler::before{content:'';position:absolute;inset:8px;border:1px dashed rgba(40,20,10,.18)}
  /* Map underlay */
  .map{position:absolute;inset:120px;z-index:1;opacity:.07;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><path d='M20 80 Q40 70 60 75 T100 80 T140 78 T180 72 L180 120 Q160 130 140 128 T100 125 T60 122 T20 118 Z' fill='none' stroke='%23111' stroke-width='.7'/><path d='M20 50 Q60 45 100 50 T180 48' fill='none' stroke='%23111' stroke-width='.5'/></svg>") center/contain no-repeat}
  /* Issue number giant ghost */
  .ghost{position:absolute;left:-40px;top:-90px;z-index:1;font-family:var(--serif);font-style:italic;font-weight:300;
    font-size:760px;line-height:1;color:rgba(139,14,34,.08);letter-spacing:-.05em;user-select:none}
  /* Layout */
  .layout{position:relative;z-index:5;padding:128px 110px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
  .top{display:flex;justify-content:space-between;align-items:flex-start;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:#5d4a30}
  .top .l{display:flex;gap:14px;align-items:center}
  .top .l .sq{width:10px;height:10px;background:var(--umber);border-radius:1px}
  .quote-block{position:relative;margin-top:34px}
  .quote-mark{position:absolute;left:-46px;top:-78px;font-family:var(--serif);font-style:italic;font-weight:300;font-size:300px;line-height:1;color:var(--umber);
    text-shadow:0 6px 0 rgba(0,0,0,.05),0 22px 60px rgba(139,14,34,.18)}
  blockquote{font-family:var(--serif);font-weight:300;font-style:italic;font-size:78px;line-height:1.04;letter-spacing:-.018em;color:#1c140a;max-width:830px;
    text-shadow:0 1px 0 rgba(255,255,255,.4)}
  blockquote em{font-weight:400;color:var(--umber);font-style:italic}
  .attr{margin-top:54px;display:flex;align-items:center;gap:22px}
  .avatar{width:78px;height:78px;border-radius:50%;
    background:url('https://picsum.photos/seed/quote-avatar/200/200') center/cover, var(--umber);
    box-shadow:inset 0 0 0 4px #ffffff, 0 10px 30px -10px rgba(0,0,0,.4), 0 0 0 5px rgba(139,14,34,.6)}
  .attr-text .n{font-family:var(--serif);font-style:italic;font-size:26px;color:#1a1208}
  .attr-text .r{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#5d4a30;margin-top:4px}
  .footer{display:flex;justify-content:space-between;align-items:flex-end}
  .page{font-family:var(--serif);font-size:22px;color:#5d4a30;font-style:italic}
  .stripes{height:14px;width:120px;background:repeating-linear-gradient(90deg,var(--umber) 0 6px, transparent 6px 14px)}
  /* Folded paper highlight */
  .paper-light{position:absolute;inset:0;z-index:0;pointer-events:none;
    background:linear-gradient(115deg, rgba(255,255,255,.55) 0%, rgba(255,255,255,0) 28%, rgba(255,255,255,0) 70%, rgba(0,0,0,.06) 100%)}
</style>
</head>
<body>
  <div class="stage">
    <div class="paper-light"></div>
    <div class="map"></div>
    <div class="ghost">61</div>
    <div class="vignette"></div>
    <div class="ruler"></div>
    <div class="grain"></div>

    <div class="layout">
      <div class="top">
        <div class="l"><span class="sq"></span>Lorem · Ipsum · Vol. 02</div>
        <div>No. LXI — MMXXVI</div>
      </div>

      <div class="quote-block">
        <div class="quote-mark">&ldquo;</div>
        <blockquote>Lorem ipsum dolor sit amet, <em>consectetur adipiscing elit</em> — sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</blockquote>
        <div class="attr">
          <div class="avatar"></div>
          <div class="attr-text">
            <div class="n">Lorem Ipsum Dolor</div>
            <div class="r">Sit amet · Consectetur</div>
          </div>
        </div>
      </div>

      <div class="footer">
        <div class="page">— pg. 02</div>
        <div class="stripes"></div>
      </div>
    </div>
  </div>
</body>
</html>
