<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Story 16 — Dimensional Pull Quote</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;1,9..144,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0a1628;--ember:#c8102e;--umber:#8b0e22;--cream:#f5f5f5;
    --serif:'Fraunces',serif;--sans:'Inter',system-ui,sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#000;display:grid;place-items:center;min-height:100vh}
  .stage{width:1080px;height:1920px;position:relative;overflow:hidden;color:var(--cream);font-family:var(--sans);
    background:
      radial-gradient(60% 40% at 50% 0%, #1d3060, #0a1628 60%),
      linear-gradient(180deg, #0a1628 0%, #080d18 100%);isolation:isolate}
  .washes{position:absolute;inset:0;z-index:1;
    background:
      radial-gradient(50% 30% at 18% 90%, rgba(139,14,34,.35), transparent 60%),
      radial-gradient(40% 30% at 82% 10%, rgba(200,16,46,.4), transparent 60%);}
  .grid-bg{position:absolute;inset:0;z-index:1;opacity:.4;
    background-image:
      linear-gradient(to right, rgba(200,16,46,.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(245,245,245,.04) 1px, transparent 1px);
    background-size:60px 60px;
    -webkit-mask-image:radial-gradient(circle at 50% 50%, #000 30%, transparent 80%);}
  .grain{position:absolute;inset:0;z-index:9;opacity:.16;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.7'/></svg>");}
  /* Massive quote mark with depth */
  .qm{position:absolute;left:60px;top:200px;font-family:var(--serif);font-style:italic;font-weight:300;font-size:820px;line-height:.78;letter-spacing:-.05em;
    background:linear-gradient(180deg, rgba(200,16,46,.95), rgba(139,14,34,.85) 60%, rgba(60,4,12,.6) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 30px 80px rgba(200,16,46,.45);
    filter:drop-shadow(0 30px 50px rgba(0,0,0,.5));
    user-select:none;z-index:3}
  /* Editorial header */
  .top{position:absolute;top:120px;left:90px;right:90px;z-index:6;display:flex;justify-content:space-between;font-size:13px;letter-spacing:.4em;text-transform:uppercase;color:#a3b1c2}
  .top .l{display:flex;align-items:center;gap:14px}
  .top .l .sq{width:10px;height:10px;background:var(--ember);border-radius:1px}
  /* Quote text */
  .body{position:absolute;left:90px;right:90px;top:840px;z-index:6}
  blockquote{font-family:var(--serif);font-weight:300;font-style:italic;font-size:104px;line-height:1.02;letter-spacing:-.022em;color:#fff;max-width:900px;
    text-shadow:0 8px 30px rgba(0,0,0,.55)}
  blockquote em{font-style:normal;color:var(--ember);font-weight:400}
  /* Avatar + attribution */
  .attr{position:absolute;left:90px;right:90px;bottom:280px;z-index:6;display:flex;align-items:center;gap:30px}
  .av{width:140px;height:140px;border-radius:50%;flex-shrink:0;
    background:url('https://picsum.photos/seed/attr-avatar/300/300') center/cover;
    box-shadow:0 0 0 5px var(--ink), 0 0 0 6px rgba(200,16,46,.7), 0 30px 60px -20px rgba(200,16,46,.55);
    filter:contrast(1.05) saturate(.9);}
  .attr-text .n{font-family:var(--serif);font-weight:300;font-size:46px;color:#fff;letter-spacing:-.015em}
  .attr-text .n em{font-style:italic;color:var(--ember)}
  .attr-text .r{margin-top:8px;font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:#a3b1c2}
  .attr-text .r span{color:#fff}
  /* Stripes accent */
  .stripes{position:absolute;left:90px;bottom:200px;width:120px;height:8px;background:repeating-linear-gradient(90deg, var(--ember) 0 8px, transparent 8px 18px);z-index:6}
  /* corners */
  .br{position:absolute;width:24px;height:24px;border:1px solid var(--ember);z-index:8}
  .br.tl{top:54px;left:54px;border-right:0;border-bottom:0}
  .br.tr{top:54px;right:54px;border-left:0;border-bottom:0}
  .br.bl{bottom:54px;left:54px;border-right:0;border-top:0}
  .br.br2{bottom:54px;right:54px;border-left:0;border-top:0}
  .baseline{position:absolute;left:0;right:0;bottom:0;height:7px;background:linear-gradient(90deg, var(--umber), var(--ember), var(--umber));z-index:9}
  .footer-mark{position:absolute;bottom:90px;left:90px;right:90px;z-index:7;display:flex;justify-content:space-between;font-size:11px;letter-spacing:.36em;text-transform:uppercase;color:#a3b1c2}
  .footer-mark span{color:#fff}
</style>
</head>
<body>
  <div class="stage">
    <div class="washes"></div>
    <div class="grid-bg"></div>
    <div class="br tl"></div><div class="br tr"></div><div class="br bl"></div><div class="br br2"></div>

    <div class="top">
      <div class="l"><span class="sq"></span>Lorem · Ipsum · MMXXVI</div>
      <div>No. XVI · Vol. III</div>
    </div>

    <div class="qm">&ldquo;</div>

    <div class="body">
      <blockquote>Lorem ipsum dolor sit amet, <em>consectetur adipiscing elit</em> — sed do eiusmod tempor incididunt ut labore et dolore magna.</blockquote>
    </div>

    <div class="attr">
      <div class="av"></div>
      <div class="attr-text">
        <div class="n"><em>Lorem</em> Ipsum Dolor.</div>
        <div class="r">Sit amet · Consectetur · <span>Adipiscing</span></div>
      </div>
    </div>
    <div class="stripes"></div>

    <div class="footer-mark"><div>Lorem · Ipsum dolor</div><div>Vol. 16 — <span>MMXXVI</span></div></div>
    <div class="grain"></div>
    <div class="baseline"></div>
  </div>
</body>
</html>
